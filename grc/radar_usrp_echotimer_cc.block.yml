id: radar_usrp_echotimer_cc
label: USRP Echotimer
category: "[RADAR]/RADAR"
flags: [throttle, python]

parameters:
  - id: samp_rate
    label: Sample rate
    dtype: int
  - id: center_freq
    label: Center frequency
    dtype: float
  - id: num_delay_samps
    label: Number delay samples
    dtype: int
    default: "0"
  - id: args_tx
    label: TX Arguments
    dtype: string
    default: "'addr=192.168.xx.xx'"
    hide: part
  - id: channel_tx
    label: TX Channel
    dtype: int
    default: "0"
    hide: part
  - id: wire_tx
    label: TX Wire
    dtype: string
    default: "''"
    hide: part
  - id: clock_source_tx
    label: TX Clock source
    dtype: string
    default: "'internal'"
    hide: part
  - id: time_source_tx
    label: TX Time source
    dtype: string
    default: "'none'"
    hide: part
  - id: antenna_tx
    label: TX Antenna
    dtype: string
    hide: part
  - id: gain_tx
    label: TX Gain
    dtype: float
    hide: part
  - id: timeout_tx
    label: TX Timeout
    dtype: float
    default: "0.1"
    hide: part
  - id: wait_tx
    label: TX Wait to start
    dtype: float
    default: "0.05"
    hide: part
  - id: lo_offset_tx
    label: TX Lo offset
    dtype: float
    default: "0"
    hide: part
  - id: args_rx
    label: RX Arguments
    dtype: string
    default: "'addr=192.168.xx.xx'"
    hide: part
  - id: channels_rx
    label: RX Channels
    dtype: int_vector
    default: "[0]"
    hide: part
  - id: wire_rx
    label: RX Wire
    dtype: string
    default: "''"
    hide: part
  - id: clock_source_rx
    label: RX Clock source
    dtype: string
    default: "'mimo'"
    hide: part
  - id: time_source_rx
    label: RX Time Source
    dtype: string
    default: "'mimo'"
    hide: part
  - id: antennas_rx
    label: RX Antennas
    dtype: raw
    default: "['RX2']"
    hide: part
  - id: gains_rx
    label: RX Gains
    dtype: real_vector
    default: "[0]"
    hide: part
  - id: timeout_rx
    label: RX Timeout
    dtype: float
    default: "0.1"
    hide: part
  - id: wait_rx
    label: RX Wait to start
    dtype: float
    default: "0.05"
    hide: part
  - id: lo_offsets_rx
    label: RX LO offsets
    dtype: real_vector
    default: "[0]"
    hide: part
  - id: len_key
    label: Packet length key
    dtype: string
    default: '"packet_len"'
    hide: part

inputs:
  - label: IQ in
    domain: stream
    dtype: complex

outputs:
  - label: IQ out
    domain: stream
    dtype: complex
    multiplicity: ${len(channels_rx)}

templates:
  imports: from gnuradio import radar
  make: |-
    radar.usrp_echotimer_cc(${samp_rate}, ${center_freq}, ${num_delay_samps},
        ${args_tx}, ${channel_tx}, ${wire_tx}, ${clock_source_tx}, ${time_source_tx}, ${antenna_tx},
        ${gain_tx}, ${timeout_tx}, ${wait_tx}, ${lo_offset_tx}, ${args_rx}, ${channels_rx}, ${wire_rx},
        ${clock_source_rx}, ${time_source_rx}, ${antennas_rx}, ${gains_rx}, ${timeout_rx},
        ${wait_rx}, ${lo_offsets_rx}, ${len_key})
  callbacks:
    - set_num_delay_samps(${num_delay_samps})
    - set_tx_gain(${gain_tx})

file_format: 1
